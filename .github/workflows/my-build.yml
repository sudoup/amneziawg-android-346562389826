name: Build and Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Build target
        type: choice
        required: true
        default: release_aab
        options:
        - release_aab
        - release_apk
        - debug_apk
      ref:
        description: Git ref (branch/tag/sha)
        required: false
        default: master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
        submodules: recursive
        fetch-depth: 0

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - uses: gradle/actions/setup-gradle@v4

    - uses: android-actions/setup-android@v3

    - name: Configure build
      id: cfg
      shell: bash
      run: |
        set -euo pipefail
        case "${{ inputs.target }}" in
          release_aab)
            echo "gradle_task=bundleRelease" >> "$GITHUB_OUTPUT"
            echo "kind=aab" >> "$GITHUB_OUTPUT"
            echo "needs_signing=true" >> "$GITHUB_OUTPUT"
            ;;
          release_apk)
            echo "gradle_task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "kind=apk" >> "$GITHUB_OUTPUT"
            echo "needs_signing=true" >> "$GITHUB_OUTPUT"
            ;;
          debug_apk)
            echo "gradle_task=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "kind=apk" >> "$GITHUB_OUTPUT"
            echo "needs_signing=false" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "Unknown target: ${{ inputs.target }}" >&2
            exit 1
            ;;
        esac

    - name: Decode keystore
      if: steps.cfg.outputs.needs_signing == 'true'
      shell: bash
      env:
        KEYSTORE_B64: ${{ secrets.KEYSTORE }}
      run: |
        set -euo pipefail
        if [[ -z "${KEYSTORE_B64}" ]]; then
          echo "Missing secret KEYSTORE" >&2
          exit 1
        fi
        echo "${KEYSTORE_B64}" | base64 --decode > release.keystore.jks
        echo "KEYSTORE_PATH=${PWD}/release.keystore.jks" >> "$GITHUB_ENV"

    - name: Build
      shell: bash
      run: |
        set -euo pipefail
        chmod +x ./gradlew
        ./gradlew --no-daemon --stacktrace ${{ steps.cfg.outputs.gradle_task }}

    - name: Locate built artifact
      id: locate
      shell: bash
      run: |
        set -euo pipefail
        case "${{ inputs.target }}" in
          release_aab)
            FILE="./ui/build/outputs/bundle/release/ui-release.aab"
            ;;
          release_apk)
            FILE="./ui/build/outputs/apk/release/ui-release-unsigned.apk"
            ;;
          debug_apk)
            FILE="./ui/build/outputs/apk/debug/ui-debug.apk"
            ;;
        esac
        if [[ -z "${FILE}" ]]; then
          echo "Built file not found" >&2
          exit 1
        fi
        echo "built_file=${FILE}" >> "$GITHUB_OUTPUT"

    - name: Sign
      if: steps.cfg.outputs.needs_signing == 'true'
      id: sign
      shell: bash
      env:
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      run: |
        set -euo pipefail
        INPUT="${{ steps.locate.outputs.built_file }}"
        EXT="${INPUT##*.}"
        OUTPUT="${INPUT%.*}-signed.${EXT}"
        if [[ -z "${SIGNING_STORE_PASSWORD}" || -z "${SIGNING_KEY_ALIAS}" ]]; then
          echo "Missing secrets: SIGNING_STORE_PASSWORD / SIGNING_KEY_ALIAS" >&2
          exit 1
        fi
        jarsigner \
          -keystore "${KEYSTORE_PATH}" \
          -storepass "${SIGNING_STORE_PASSWORD}" \
          ${SIGNING_KEY_PASSWORD:+-keypass "${SIGNING_KEY_PASSWORD}"} \
          -signedjar "${OUTPUT}" \
          "${INPUT}" \
          "${SIGNING_KEY_ALIAS}"
        echo "final_file=${OUTPUT}" >> "$GITHUB_OUTPUT"

    - name: Read version
      id: version
      shell: bash
      run: |
        set -euo pipefail
        VERSION_NAME=$(grep amneziawgVersionName gradle.properties | cut -d= -f2)
        echo "tag=v${VERSION_NAME}" >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: AmneziaWG ${{ steps.version.outputs.tag }}
        target_commitish: ${{ inputs.ref }}
        files: ${{ steps.sign.outputs.final_file || steps.locate.outputs.built_file }}
        generate_release_notes: true
        make_latest: true
